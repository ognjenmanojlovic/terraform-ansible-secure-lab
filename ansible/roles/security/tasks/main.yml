- name: Install security packages
  ansible.builtin.apt:
    name:
      - ufw
      - fail2ban
      - unattended-upgrades
    state: present

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP through UFW
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow Gitea web interface
  community.general.ufw:
    rule: allow
    port: "3000"
    proto: tcp

- name: Allow Gitea SSH
  community.general.ufw:
    rule: allow
    port: "2222"
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny

- name: Enable and start Fail2Ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
    